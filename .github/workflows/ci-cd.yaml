name: Restauranty CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ============================================================
    # Checkout
    # ============================================================
    - name: Checkout code
      uses: actions/checkout@v4

    # ============================================================
    # Docker Buildx
    # ============================================================
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ============================================================
    # Login to Azure Container Registry
    # ============================================================
    - name: Log in to ACR
      uses: docker/login-action@v3
      with:
        registry: ireneandjoaoacr.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # ============================================================
    # Build & Push Microservices
    # ============================================================
    - name: Build and push Auth image
      uses: docker/build-push-action@v3
      with:
        context: ./backend/auth
        file: ./backend/auth/Dockerfile
        push: true
        tags: ireneandjoaoacr.azurecr.io/restauranty-auth:latest

    - name: Build and push Discounts image
      uses: docker/build-push-action@v3
      with:
        context: ./backend/discounts
        file: ./backend/discounts/Dockerfile
        push: true
        tags: ireneandjoaoacr.azurecr.io/restauranty-discounts:latest

    - name: Build and push Items image
      uses: docker/build-push-action@v3
      with:
        context: ./backend/items
        file: ./backend/items/Dockerfile
        push: true
        tags: ireneandjoaoacr.azurecr.io/restauranty-items:latest

    - name: Build and push Frontend image
      uses: docker/build-push-action@v3
      with:
        context: ./client
        file: ./client/Dockerfile
        push: true
        tags: ireneandjoaoacr.azurecr.io/restauranty-client:latest

    # ============================================================
    # Sonarqube Analysis
    # ============================================================
    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        args: >
          -Dsonar.projectKey=restauranty
          -Dsonar.sources=backend/auth,backend/discounts,backend/items,client/src

    # ============================================================
    # Configure Azure + kubectl
    # ============================================================
    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set AKS context
      uses: azure/aks-set-context@v3
      with:
        resource-group: IreneandJoao
        cluster-name: IreneandJoao

    - name: Update Helm dependencies
      run: helm dependency update k8s/helm

    - name: Deploy to AKS with Helm
      run: |
        helm upgrade --install restauranty k8s/helm \
          --set auth.tag=latest \
          --set discounts.tag=latest \
          --set items.tag=latest \
          --set frontend.tag=latest

    - name: Restart deployments
      run: |
        kubectl rollout restart deployment/auth
        kubectl rollout restart deployment/discounts
        kubectl rollout restart deployment/items
        kubectl rollout restart deployment/frontend
