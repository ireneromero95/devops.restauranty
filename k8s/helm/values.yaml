# ============================================================
# Global
# ============================================================
acr: ireneandjoaoacr.azurecr.io
secret: 'ireneandjoao_secret_key'

# ============================================================
# MongoDB
# ============================================================
mongodb:
  uri: 'mongodb://localhost:27017/restauranty'

# ============================================================
# Microservices
# ============================================================
auth:
  image: ireneandjoaoacr.azurecr.io/restauranty-auth
  tag: latest
  port: 3001
  replicas: 1

discounts:
  image: ireneandjoaoacr.azurecr.io/restauranty-discounts
  tag: latest
  port: 3002
  replicas: 1

items:
  image: ireneandjoaoacr.azurecr.io/restauranty-items
  tag: latest
  port: 3003
  replicas: 1

# ============================================================
# Frontend
# ============================================================
frontend:
  image: ireneandjoaoacr.azurecr.io/restauranty-client
  tag: latest
  port: 80
  replicas: 1
  serverUrl: "http://restauranty-ij.az.ironlabs.online"

# ============================================================
# Prometheus
# ============================================================
prometheus:
  server:
    persistentVolume:
      enabled: false
  extraScrapeConfigs: |
    - job_name: 'restauranty-auth'
      static_configs:
        - targets: ['auth.default.svc.cluster.local:3001']
    - job_name: 'restauranty-discounts'
      static_configs:
        - targets: ['discounts.default.svc.cluster.local:3002']
    - job_name: 'restauranty-items'
      static_configs:
        - targets: ['items.default.svc.cluster.local:3003']

# ============================================================
# Grafana
# ============================================================
grafana:
  enabled: true
  adminPassword: 'restauranty123'
  service:
    type: LoadBalancer
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://restauranty-prometheus-server:80
          isDefault: true
          access: proxy
          editable: true
        - name: Loki
          type: loki
          url: http://restauranty-loki:3100
          access: proxy
          editable: true

# ============================================================
# Sonarqube
# ============================================================
sonarqube:
  service:
    type: LoadBalancer
    externalPort: 9000
    internalPort: 9000
  persistence:
    enabled: false
  postgresql:
    enabled: false
  jdbcOverwrite:
    enable: true
    jdbcUrl: "jdbc:postgresql://sonarqube-db:5432/sonarqube"
    jdbcUsername: sonarqube
    jdbcPassword: sonarqube

# ============================================================
# Loki Stack
# ============================================================
loki-stack:
  loki:
    enabled: true
    persistence:
      enabled: false
  promtail:
    enabled: true
    config:
      clients:
        - url: http://restauranty-loki:3100/loki/api/v1/push